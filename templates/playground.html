<script>
const METHODS = {{ methods | tojson }};
const GPUS = {{ gpus | tojson }};
const MODELS = {{ models | tojson }};

let state = {
  method: 'lora',
  model: '7b',
  gpu: 'a100_80',
  gpu_count: 1,
  sharding: 'none',
  rank: 16,
  batch: 4,
  seq: 2048,
  precision: 'bf16',
  optimizer: 'paged_adamw_8bit',
  grad_checkpoint: true,
};

// --- UI Selectors ---
function selectPrecision(id) {
  state.precision = id;
  document.querySelectorAll('#precision-selector button').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  updateCalc();
}
function selectOptimizer(id) {
  state.optimizer = id;
  document.querySelectorAll('#optimizer-selector button').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  updateCalc();
}
function toggleGradCheckpoint() {
  state.grad_checkpoint = !state.grad_checkpoint;
  document.getElementById('grad-checkpoint-btn').classList.toggle('active', state.grad_checkpoint);
  updateCalc();
}
function selectSharding(id) {
  state.sharding = id;
  document.querySelectorAll('#sharding-selector button').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  updateCalc();
}
function selectMethod(id) {
  state.method = id;
  document.querySelectorAll('#method-tabs button').forEach(b => {
    b.className = `px-4 py-2 rounded-xl text-xs font-bold border transition-all duration-300 flex items-center gap-2 ${b.dataset.id === id ? 'bg-brand-accent/10 border-brand-accent text-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.15)]' : 'border-brand-border text-brand-text2 hover:text-brand-text hover:bg-brand-bg3'}`;
  });
  document.getElementById('method-desc').textContent = METHODS.find(x => x.id === id).desc;
  document.getElementById('lora-controls').style.display = ['lora','qlora','dora'].includes(id) ? 'block' : 'none';
  updateCalc();
}
function selectModel(id) {
  state.model = id;
  document.querySelectorAll('#model-selector button').forEach(b => {
    b.className = `flex flex-col items-center justify-center p-3 rounded-xl border font-mono text-[11px] transition-all duration-300 ${b.dataset.id === id ? 'bg-brand-accent/10 border-brand-accent text-brand-accent shadow-[0_0_10px_rgba(59,130,246,0.1)]' : 'border-brand-border text-brand-text3 hover:text-brand-text hover:bg-brand-bg3'}`;
  });
  updateCalc();
}
function selectGPU(id) {
  state.gpu = id;
  document.querySelectorAll('#gpu-selector button').forEach(b => {
    b.className = `group p-4 rounded-xl border text-left transition-all duration-300 ${b.dataset.id === id ? 'bg-brand-accent/10 border-brand-accent text-brand-accent shadow-[0_0_10px_rgba(59,130,246,0.1)]' : 'border-brand-border text-brand-text2 hover:bg-brand-bg3 hover:border-brand-border2'}`;
  });
  updateCalc();
}

// --- VRAM Calculation Engine ---
function updateCalc() {
  // Update state from sliders
  state.rank = parseInt(document.getElementById('rank-slider').value);
  state.batch = parseInt(document.getElementById('batch-slider').value);
  state.seq = parseInt(document.getElementById('seq-slider').value);
  state.gpu_count = parseInt(document.getElementById('gpu-count-slider').value);
  
  // Update UI values from state
  document.getElementById('rank-val').textContent = state.rank;
  document.getElementById('batch-val').textContent = state.batch;
  document.getElementById('seq-val').textContent = state.seq;
  document.getElementById('gpu-count-val').textContent = state.gpu_count;

  // Get current selections
  const m = METHODS.find(x => x.id === state.method);
  const gpu = GPUS.find(x => x.id === state.gpu);
  const mdl = MODELS.find(x => x.id === state.model);

  // Core parameters
  const P = mdl.params;
  const D = mdl.d;
  const L = mdl.layers;
  const R = state.rank;
  const B = state.batch;
  const S = state.seq;
  const N = state.gpu_count;
  const precisionBytes = {'bf16': 2, 'fp16': 2, 'fp32': 4}[state.precision];
  const optimizerBytes = state.optimizer === 'adamw_32bit' ? 8 : 1;

  let weightsGB, gradsGB, optimGB, actGB, trainableParams;
  const totalParams = P * 1e9;

  // Base estimates before sharding
  if (['full', 'rlhf', 'galore'].includes(state.method)) {
    weightsGB = P * precisionBytes;
    gradsGB = P * precisionBytes;
    optimGB = (state.method === 'galore') ? (P * 0.25) : (P * optimizerBytes);
    trainableParams = totalParams;
    if (state.method === 'rlhf') { weightsGB *= 2; gradsGB *= 1; }
  } else {
    weightsGB = state.method === 'qlora' ? P * 0.5 : P * precisionBytes;
    const adapterParams = (state.method === 'prefix') ? (20 * L * 2 * D) : 
                          (state.method === 'adapters') ? (2 * L * 2 * D * 64) : 
                          (4 * L * 2 * D * R); // LoRA, DoRA
    trainableParams = adapterParams;
    gradsGB = (adapterParams * precisionBytes) / 1e9;
    optimGB = (adapterParams * optimizerBytes) / 1e9;
  }
  
  actGB = (B * S * D * L * precisionBytes) / 1e9;
  if(state.grad_checkpoint) actGB *= 0.55;
  actGB = Math.min(actGB, 25);

  // Apply Sharding Math
  if (N > 1) {
    if (state.sharding === 'zero1') {
      optimGB /= N;
    } else if (state.sharding === 'zero2') {
      optimGB /= N;
      gradsGB /= N;
    } else if (['zero3', 'fsdp'].includes(state.sharding)) {
      optimGB /= N;
      gradsGB /= N;
      weightsGB /= N;
    }
  }

  const totalVRAM = weightsGB + gradsGB + optimGB + actGB;
  updateUI(totalVRAM, { weightsGB, gradsGB, optimGB, actGB }, { trainableParams, totalParams }, gpu, mdl);
}

// --- UI Rendering ---
function updateUI(totalVRAM, mem, params, gpu, mdl) {
  const gpuVRAM = gpu.vram;
  const fits = totalVRAM <= gpuVRAM;
  const tight = totalVRAM > gpuVRAM * 0.85 && fits;

  document.getElementById('vram-used').textContent = totalVRAM.toFixed(1);
  document.getElementById('vram-total').textContent = gpuVRAM;

  const maxBar = Math.max(totalVRAM, gpuVRAM) * 1.1;
  document.getElementById('seg-weights').style.width = (mem.weightsGB/maxBar*100)+'%';
  document.getElementById('seg-grads').style.width = (mem.gradsGB/maxBar*100)+'%';
  document.getElementById('seg-optim').style.width = (mem.optimGB/maxBar*100)+'%';
  document.getElementById('seg-act').style.width = (mem.actGB/maxBar*100)+'%';
  document.getElementById('vram-limit-line').style.left = (gpuVRAM/maxBar*100)+'%';

  const resVRAM = document.getElementById('res-vram');
  resVRAM.textContent = totalVRAM.toFixed(1) + ' GB';
  resVRAM.style.color = fits ? (tight ? '#f59e0b' : '#3B82F6') : '#ef4444';
  document.getElementById('res-vram-sub').textContent = `W:${mem.weightsGB.toFixed(1)} G:${mem.gradsGB.toFixed(1)} O:${mem.optimGB.toFixed(1)} A:${mem.actGB.toFixed(1)}`;

  const fmtParams = params.trainableParams >= 1e9 ? (params.trainableParams/1e9).toFixed(1)+'B' : (params.trainableParams/1e6).toFixed(1)+'M';
  document.getElementById('res-params').textContent = fmtParams;
  document.getElementById('res-params-pct').textContent = `${(params.trainableParams / params.totalParams * 100).toFixed(3)}% of total`;
  
  // Verdict
  const v = document.getElementById('verdict');
  if (fits && !tight) {
    v.className = 'p-6 rounded-2xl border bg-green-500/5 border-green-500/20 text-green-400 text-sm leading-relaxed';
    v.innerHTML = `<div class="font-bold flex items-center gap-2 mb-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> Signal Clear</div>Fits comfortably. ${(gpuVRAM - totalVRAM).toFixed(1)}GB headroom per GPU.`;
  } else if (tight) {
    v.className = 'p-6 rounded-2xl border bg-yellow-500/5 border-yellow-500/20 text-yellow-400 text-sm leading-relaxed';
    v.innerHTML = `<div class="font-bold flex items-center gap-2 mb-1"><span class="w-2 h-2 rounded-full bg-yellow-500"></span> Peak Warning</div>Tight fit. Only ${(gpuVRAM - totalVRAM).toFixed(1)}GB headroom.`;
  } else {
    v.className = 'p-6 rounded-2xl border bg-red-500/5 border-red-500/20 text-red-400 text-sm leading-relaxed';
    v.innerHTML = `<div class="font-bold flex items-center gap-2 mb-1"><span class="w-2 h-2 rounded-full bg-red-500"></span> Node Memory Overflow</div>Doesn't fit. ${totalVRAM.toFixed(1)}GB needed per GPU.`;
  }
  document.getElementById('code-snippet').textContent = METHODS.find(m => m.id === state.method).code;
}

// --- Recipe & Modal Logic ---
let currentRecipeFramework = 'axolotl';
function openRecipeModal() {
  document.getElementById('recipe-modal').classList.remove('hidden');
  document.getElementById('recipe-method-name').textContent = METHODS.find(x => x.id === state.method).name;
  switchRecipe('axolotl');
}
function closeRecipeModal() { document.getElementById('recipe-modal').classList.add('hidden'); }
function switchRecipe(framework) {
  currentRecipeFramework = framework;
  document.querySelectorAll('.recipe-tab').forEach(b => b.classList.toggle('active', b.id === `tab-${framework}`));
  document.getElementById('recipe-content').textContent = generateRecipe(framework);
}
function generateRecipe(fw) { /* ... YAML generation logic from previous steps ... */ return `YAML for ${fw} goes here...`; }
function copyRecipe() { /* ... copy logic ... */ }
function downloadRecipe() { /* ... download logic ... */ }

// --- Initialization ---
document.addEventListener('DOMContentLoaded', () => {
    selectMethod('lora');
    selectModel('7b');
    selectGPU('a100_80');
    selectPrecision('bf16');
    selectOptimizer('paged_adamw_8bit');
    toggleGradCheckpoint(); // to set initial state correctly
    toggleGradCheckpoint(); // toggle back
});
</script>
