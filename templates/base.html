<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block title %}llmviz.studio{% endblock %}</title>
  <meta name="description" content="Interactive 3D visualizations of LLM fine-tuning methods — LoRA, QLoRA, DPO, and more."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #06080F; --bg2: #0C1018; --bg3: #121824;
      --text: #D8DEE9; --text2: #8892A8; --text3: #4A5468;
      --border: #1A2030; --border2: #252E40;
      --accent: #3B82F6; --accent2: #60A5FA;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    code,.mono{font-family:'JetBrains Mono',monospace}

    /* Nav */
    .nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,8,15,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .nav-brand{font-size:16px;font-weight:700;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px}
    .nav-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
    .nav-links{display:flex;gap:4px}
    .nav-links a{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.2s}
    .nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--bg3)}

    .page{padding-top:60px;min-height:100vh}

    /* Utility */
    .container{max-width:1100px;margin:0 auto;padding:0 20px}
    .mono{font-family:'JetBrains Mono',monospace}
    .label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3)}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all 0.25s;font-family:inherit}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 20px rgba(59,130,246,0.2)}
    .btn-primary:hover{background:#2563EB;box-shadow:0 0 30px rgba(59,130,246,0.3)}
    .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
    .btn-ghost:hover{color:var(--text);border-color:var(--text3)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .fade-up{animation:fadeUp 0.6s ease-out both}
    .fade-in{animation:fadeIn 0.5s ease-out both}
    .delay-1{animation-delay:0.1s}.delay-2{animation-delay:0.2s}.delay-3{animation-delay:0.3s}.delay-4{animation-delay:0.4s}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand"><span class="dot"></span> llmviz.studio</a>
    <div class="nav-links">
      <a href="/" class="{{ 'active' if active_page == 'home' else '' }}">Home</a>
      <a href="/explore" class="{{ 'active' if active_page == 'explore' else '' }}">3D Explorer</a>
      <a href="/playground" class="{{ 'active' if active_page == 'playground' else '' }}">Playground</a>
    </div>
  </nav>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
