<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}llmviz.studio{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#ffffff', bg2: '#f8fafc', bg3: '#f1f5f9',
                            text: '#0f172a', text2: '#475569', text3: '#64748b',
                            border: '#e2e8f0', border2: '#cbd5e1',
                            accent: '#3b82f6', accent2: '#60a5fa',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .btn-primary { @apply inline-flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold bg-brand-accent text-white transition-all duration-200 shadow-lg hover:bg-blue-600 hover:shadow-xl hover:scale-105; }
            .btn-ghost { @apply inline-flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold bg-transparent text-brand-text2 border border-brand-border2 transition-all duration-200 hover:text-brand-text hover:border-brand-text3 hover:bg-brand-bg2; }
            .fade-up { animation: fadeUp 0.6s ease-out both; }
            .fade-in { animation: fadeIn 0.5s ease-in-out both; }
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-brand-bg text-brand-text font-sans antialiased">
    <nav class="fixed top-0 left-0 right-0 z-[100] px-6 py-4 flex items-center justify-between bg-white/80 backdrop-blur-xl border-b border-brand-border shadow-sm">
        <a href="/" class="text-lg font-semibold tracking-tight flex items-center gap-2 group text-brand-text">
            <span class="w-2 h-2 rounded-full bg-brand-accent group-hover:scale-125 transition-transform duration-200"></span>
            llmviz.studio
        </a>
        <div class="flex items-center gap-2">
            {% if current_user.is_authenticated %}
                <div class="flex items-center gap-1 bg-brand-bg2/50 p-1 rounded-xl border border-brand-border">
                    <a href="/explore" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'explore' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Explorer</a>
                    <a href="/playground" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'playground' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Playground</a>
                    <a href="/guide" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'guide' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Guide</a>
                    <a href="/data" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'data' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Data</a>
                    <a href="/learn/lora" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'learn' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Learn</a>
                </div>
                <div class="w-px h-6 bg-brand-border mx-2"></div>
                <a href="/logout" class="px-4 py-2 rounded-lg text-xs font-semibold text-red-400 hover:bg-red-500/10 transition-all">Logout</a>
            {% else %}
                 <a href="/login" class="btn-primary !text-xs !px-5 !py-2">Sign In</a>
            {% endif %}
        </div>
    </nav>
    <main class="pt-[65px]">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
