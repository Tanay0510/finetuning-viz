<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block title %}llmviz.studio{% endblock %}</title>
  <meta name="description" content="Interactive 3D visualizations of LLM fine-tuning methods — LoRA, QLoRA, DPO, and more."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              bg: '#06080F',
              bg2: '#0C1018',
              bg3: '#121824',
              text: '#D8DEE9',
              text2: '#8892A8',
              text3: '#4A5468',
              border: '#1A2030',
              border2: '#252E40',
              accent: '#3B82F6',
              accent2: '#60A5FA',
            }
          },
          fontFamily: {
            sans: ['Instrument Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-primary {
        @apply inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-[13px] font-semibold bg-brand-accent text-white transition-all shadow-[0_0_20px_rgba(59,130,246,0.2)] hover:bg-blue-600 hover:shadow-[0_0_30px_rgba(59,130,246,0.3)];
      }
      .btn-ghost {
        @apply inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-[13px] font-semibold bg-transparent text-brand-text2 border border-brand-border2 transition-all hover:text-brand-text hover:border-brand-text3;
      }
      .fade-up {
        animation: fadeUp 0.6s ease-out both;
      }
      .fade-in {
        animation: fadeIn 0.5s ease-out both;
      }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      .delay-4 { animation-delay: 0.4s; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #06080F; }
    ::-webkit-scrollbar-thumb { background: #1A2030; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #252E40; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-brand-bg text-brand-text font-sans antialiased overflow-x-hidden">
  <nav class="fixed top-0 left-0 right-0 z-[100] px-6 py-3.5 flex items-center justify-between bg-brand-bg/85 backdrop-blur-2xl border-b border-brand-border">
    <a href="/" class="text-base font-bold tracking-tight flex items-center gap-2 group">
      <span class="w-2 h-2 rounded-full bg-brand-accent shadow-[0_0_8px_var(--tw-shadow-color)] shadow-brand-accent group-hover:scale-125 transition-transform"></span> 
      llmviz.studio
    </a>
    <div class="flex items-center gap-1 bg-brand-bg2/50 p-1 rounded-xl border border-brand-border">
      <a href="/" class="px-4 py-1.5 rounded-lg text-[13px] font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'home' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Home</a>
      
      {% if current_user.is_authenticated %}
        <a href="/explore" class="px-4 py-1.5 rounded-lg text-[13px] font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'explore' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Explorer</a>
        <a href="/playground" class="px-4 py-1.5 rounded-lg text-[13px] font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'playground' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Playground</a>
        <a href="/guide" class="px-4 py-1.5 rounded-lg text-[13px] font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'guide' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Guide</a>
        <a href="/data" class="px-4 py-1.5 rounded-lg text-[13px] font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'data' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Data Prep</a>
        <div class="w-px h-4 bg-brand-border mx-1"></div>
        <a href="/logout" class="px-4 py-1.5 rounded-lg text-[13px] font-semibold text-red-400 hover:bg-red-500/10 transition-all">Logout</a>
      {% else %}
        <a href="/login" class="px-4 py-1.5 rounded-lg text-[13px] font-semibold text-brand-accent hover:bg-brand-accent/10 transition-all">Sign In</a>
      {% endif %}
    </div>
  </nav>
  <main class="pt-[60px] min-h-screen">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
