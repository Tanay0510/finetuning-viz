<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}llmviz.studio{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#06080F', bg2: '#0C1018', bg3: '#121824',
                            text: '#D8DEE9', text2: '#8892A8', text3: '#4A5468',
                            border: '#1A2030', border2: '#252E40',
                            accent: '#3B82F6', accent2: '#60A5FA',
                        }
                    },
                    fontFamily: {
                        sans: ['Instrument Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .btn-primary { @apply inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold bg-brand-accent text-white transition-all shadow-[0_0_20px_rgba(59,130,246,0.2)] hover:bg-blue-600 hover:shadow-[0_0_30px_rgba(59,130,246,0.3)]; }
            .btn-ghost { @apply inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold bg-transparent text-brand-text2 border border-brand-border2 transition-all hover:text-brand-text hover:border-brand-text3; }
            .fade-up { animation: fadeUp 0.6s ease-out both; }
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-brand-bg text-brand-text font-sans antialiased">
    <nav class="fixed top-0 left-0 right-0 z-[100] px-6 py-3.5 flex items-center justify-between bg-brand-bg/85 backdrop-blur-2xl border-b border-brand-border">
        <a href="/" class="text-base font-bold tracking-tight flex items-center gap-2 group">
            <span class="w-2 h-2 rounded-full bg-brand-accent shadow-[0_0_8px_theme(colors.brand.accent)] group-hover:scale-125 transition-transform"></span>
            llmviz.studio
        </a>
        <div class="flex items-center gap-2">
            {% if current_user.is_authenticated %}
                <div class="flex items-center gap-1 bg-brand-bg2/50 p-1 rounded-xl border border-brand-border">
                    <a href="/explore" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'explore' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Explorer</a>
                    <a href="/playground" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'playground' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Playground</a>
                    <a href="/guide" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'guide' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Guide</a>
                    <a href="/data" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'data' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Data</a>
                    <a href="/compare" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'compare' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Compare</a>
                    <a href="/attention" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'attention' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Attention</a>
                    <a href="/learn/lora" class="px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-300 {{ 'text-white bg-brand-accent shadow-[0_0_15px_rgba(59,130,246,0.4)]' if active_page == 'learn' else 'text-brand-text2 hover:text-brand-text hover:bg-brand-bg3' }}">Learn</a>
                </div>
                <div class="w-px h-6 bg-brand-border mx-2"></div>
                <a href="/logout" class="px-4 py-2 rounded-lg text-xs font-semibold text-red-400 hover:bg-red-500/10 transition-all">Logout</a>
            {% else %}
                 <a href="/login" class="btn-primary !text-xs !px-5 !py-2">Sign In</a>
            {% endif %}
        </div>
    </nav>
    <main class="pt-[65px]">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
