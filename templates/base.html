<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block title %}llmviz.studio{% endblock %}</title>
  <meta name="description" content="Interactive 3D visualizations of LLM fine-tuning methods — LoRA, QLoRA, DPO, and more."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              bg: '#06080F',
              bg2: '#0C1018',
              bg3: '#121824',
              text: '#D8DEE9',
              text2: '#8892A8',
              text3: '#4A5468',
              border: '#1A2030',
              border2: '#252E40',
              accent: '#3B82F6',
              accent2: '#60A5FA',
            }
          },
          fontFamily: {
            sans: ['Instrument Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-primary {
        @apply inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-[13px] font-semibold bg-brand-accent text-white transition-all shadow-[0_0_20px_rgba(59,130,246,0.2)] hover:bg-blue-600 hover:shadow-[0_0_30px_rgba(59,130,246,0.3)];
      }
      .btn-ghost {
        @apply inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-[13px] font-semibold bg-transparent text-brand-text2 border border-brand-border2 transition-all hover:text-brand-text hover:border-brand-text3;
      }
      .fade-up { animation: fadeUp 0.6s ease-out both; }
      .fade-in { animation: fadeIn 0.5s ease-out both; }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #06080F; }
    ::-webkit-scrollbar-thumb { background: #1A2030; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #252E40; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand"><span class="dot"></span> llmviz.studio</a>
    <div class="nav-links">
      <a href="/" class="{{ 'active' if active_page == 'home' else '' }}">Home</a>
      <a href="/explore" class="{{ 'active' if active_page == 'explore' else '' }}">3D Explorer</a>
      <a href="/playground" class="{{ 'active' if active_page == 'playground' else '' }}">Playground</a>
      <a href="/learn/lora" class="{{ 'active' if active_page == 'learn' else '' }}">Learn</a>
      <a href="/guide" class="{{ 'active' if active_page == 'guide' else '' }}">Guide</a>
    </div>
  </nav>
  <main class="pt-[60px] min-h-screen">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
